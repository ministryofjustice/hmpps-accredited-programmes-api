name: "CodeQL"

on:
  pull_request:
  push:
    branches: [ "main" ]

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'java' ]
        # Use only 'java' to analyze code written in Java, Kotlin or both

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # Temporarily disabled due to Kotlin version incompatibility
      # The gradle-spring-boot plugin 9.3.0 requires Kotlin 2.2.21+
      # CodeQL currently supports Kotlin versions below 2.2.30
      # Re-enable once CodeQL adds support for newer Kotlin versions
      - name: Initialize CodeQL
        if: false
        uses: github/codeql-action/init@b623f5fd572a69d335c9da3487c1ce53741a09bf
        with:
          languages: 'java'
          # Use only 'java' to analyze code written in Java, Kotlin or both

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: 'temurin'
          java-version: 21
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew --no-daemon build -x test

      # Temporarily disabled due to Kotlin version incompatibility
      - name: Perform CodeQL Analysis
        if: false
        uses: github/codeql-action/analyze@b623f5fd572a69d335c9da3487c1ce53741a09bf
        with:
          category: "/language:${{matrix.language}}"